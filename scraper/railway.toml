# ── GaukDarba — Railway deploy config ────────────────────────────────────────
#
# Two separate Railway Cron Job services share this same Docker image.
# The RUN_MODE env var controls which stages each service executes.
#
# ── SERVICE 1: scraper (once a day at 04:00 Lithuania time) ──────────────────
#   RUN_MODE = scraper
#   Lithuania is UTC+2 (EET, winter) / UTC+3 (EEST, summer)
#   04:00 Lithuania → 02:00 UTC in winter  →  cron: "0 2 * * *"
#                  → 01:00 UTC in summer   →  cron: "0 1 * * *"
#   Recommended: "0 2 * * *" year-round (1h late in summer is fine)
#
# ── SERVICE 2: matcher (every hour) ──────────────────────────────────────────
#   RUN_MODE = matcher
#   cron: "0 * * * *"
#   Runs title_matcher → detail_scraper → detail_matcher against today's DB data.
#   Safe to run before the scraper fires — it will simply find 0 new listings.
#
# ── Railway setup ─────────────────────────────────────────────────────────────
#   Service 1 (scraper):
#     New Service → GitHub Repo → Root dir: scraper/
#     Type: Cron Job,  Schedule: "0 2 * * *"
#     Env: RUN_MODE=scraper  + all shared vars below
#
#   Service 2 (matcher):
#     New Service → GitHub Repo → Root dir: scraper/
#     Type: Cron Job,  Schedule: "0 * * * *"
#     Env: RUN_MODE=matcher  + all shared vars below
#
# ── Shared environment variables ──────────────────────────────────────────────
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   OPENAI_API_KEY
#   RESEND_API_KEY
#   RESEND_FROM_EMAIL   (e.g. "GaukDarba <noreply@gaukdarba.lt>")
#   APP_URL             (e.g. "https://gaukdarba.lt")
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder          = "dockerfile"
dockerfilePath   = "Dockerfile"

# Deploy settings removed — configure per-service in Railway UI:
#   MAIN (cron):        Start command: python main.py,    Restart: Never
#   ScanNowCALL (web):  Start command: python api_server.py, Restart: On failure
