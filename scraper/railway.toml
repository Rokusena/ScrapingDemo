# ── GaukDarba scraper — Railway deploy config ─────────────────────────────────
#
# This service is a one-shot job: it runs main.py and exits.
# Railway Cron Job services restart it on schedule.
#
# Setup in Railway dashboard:
#   1. "New Service" → "GitHub Repo" → select this repo
#   2. Root directory: scraper/
#   3. Service type: "Cron Job"
#   4. Schedule (see below)
#
# Cron schedule for 07:00 and 17:00 Europe/Vilnius:
#
#   Lithuania is UTC+2 (EET, winter) / UTC+3 (EEST, summer, last Sun Mar–Oct)
#
#   UTC equivalent:
#     Winter (Nov–Mar):  05:00 and 15:00 UTC  →  "0 5,15 * * *"
#     Summer (Apr–Oct):  04:00 and 14:00 UTC  →  "0 4,14 * * *"
#
#   Recommended: use "0 5,15 * * *" year-round — runs at 07:00/17:00 in winter
#   and 08:00/18:00 in summer (1h late in summer is acceptable for a job alert).
#   ── OR ── set up two separate cron services with seasonal schedules.
#
# Railway environment variables to set:
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   OPENAI_API_KEY
#   RESEND_API_KEY
#   RESEND_FROM_EMAIL   (e.g. "GaukDarba <noreply@gaukdarba.lt>")
#   APP_URL             (e.g. "https://gaukdarba.lt")
# ──────────────────────────────────────────────────────────────────────────────

[build]
builder          = "dockerfile"
dockerfilePath   = "Dockerfile"

[deploy]
startCommand        = "python main.py"
restartPolicyType   = "never"    # job exits after each run — don't loop
numReplicas         = 1

# Cron schedule — set this in the Railway dashboard under the service settings
# or via Railway CLI:  railway service update --cron "0 5,15 * * *"
#
# cronSchedule = "0 5,15 * * *"
